# ─── coturn TURN Server Configuration ────────────────────────────────────────
# Production-grade: time-limited credentials, logging, relay port range

# Network
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
relay-ip=0.0.0.0
external-ip=__YOUR_PUBLIC_IP__

# Authentication (use same secret as signaling server)
use-auth-secret
static-auth-secret=KPk9rnV1NLUcSHqCCYOG-UsmzH-jAcKlqO9NZAsfLKLFOc6DGQqua7I3FpFbzbq6

# Realm
realm=videocall.app

# Relay port range (firewall must allow these)
min-port=49152
max-port=49200

# Logging
log-file=/var/log/turnserver.log
verbose

# Security
no-multicast-peers
no-cli
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# Performance
proc-quota-time=1000
total-quota=1000
max-bps=0

# Per-user rate limiting
user-quota=100
total-quota=1000

# Fingerprint for NAT detection
fingerprint

# STUN support
stun-only=0
