# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Aux — Android APK Build (Optimized)                                        ║
# ║  Target: ~8-12 min (vs 25+ min unoptimized)                                ║
# ║                                                                             ║
# ║  Optimizations:                                                             ║
# ║  ★ Gradle build cache + distribution cache (~40% faster rebuilds)           ║
# ║  ★ Node modules cache (skip npm ci on unchanged lockfile)                   ║
# ║  ★ arm64-v8a only (skip 3 unnecessary architectures)                       ║
# ║  ★ Gradle daemon enabled (persistent JVM across tasks)                     ║
# ║  ★ Parallel Gradle execution                                               ║
# ║  ★ Skip lint + tests (done separately if needed)                           ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/build-android.yml"
  workflow_dispatch:

env:
  JAVA_VERSION: "17"
  NODE_VERSION: "20"

jobs:
  build:
    name: 🔨 Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: mobile

    steps:
      # ─── Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ─── Node.js + npm cache ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      # ─── Java 17 ─────────────────────────────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      # ─── Android SDK ─────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ─── Gradle Cache (biggest speed win) ────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            mobile/android/.gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/android/gradle/wrapper/gradle-wrapper.properties', 'mobile/android/build.gradle', 'mobile/android/app/build.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ─── Install npm dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ─── Expo Prebuild (generates android/ directory) ────────────────────
      - name: Expo prebuild
        run: npx expo prebuild --clean --platform android

      # ─── Patch: Add Notifee Maven repo ───────────────────────────────────
      - name: Add Notifee Maven repo
        run: |
          # Add Notifee local Maven repository to project-level build.gradle
          sed -i "/maven { url 'https:\/\/www.jitpack.io' }/a\\        maven { url \"\$rootDir/../node_modules/@notifee/react-native/android/libs\" }" android/build.gradle

      # ─── Patch: Fix manifest merger conflict ─────────────────────────────
      - name: Fix Firebase manifest merger conflict
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Only add tools namespace if not already present (expo prebuild usually includes it)
          if ! grep -q 'xmlns:tools' "$MANIFEST"; then
            sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android"|<manifest xmlns:android="http://schemas.android.com/apk/res/android" xmlns:tools="http://schemas.android.com/tools"|' "$MANIFEST"
          fi
          # Add tools:replace to the notification color meta-data to resolve the merge conflict
          sed -i 's|<meta-data android:name="com.google.firebase.messaging.default_notification_color" android:resource="@color/notification_icon_color"/>|<meta-data android:name="com.google.firebase.messaging.default_notification_color" android:resource="@color/notification_icon_color" tools:replace="android:resource"/>|' "$MANIFEST"

      # ─── Patch: Play Protect compliance fixes ──────────────────────────
      - name: Apply security hardening
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # 1. Disable allowBackup (Play Protect flag: data exfiltration risk)
          sed -i 's|android:allowBackup="true"|android:allowBackup="false"|' "$MANIFEST"

          # 2. Add hasFragileUserData="false" (reduces Play Protect risk score)
          sed -i 's|android:allowBackup="false"|android:allowBackup="false" android:hasFragileUserData="false"|' "$MANIFEST"

          # 3. Block cleartext traffic in production + network security config
          if ! grep -q 'android:networkSecurityConfig' "$MANIFEST"; then
            sed -i 's|android:enableOnBackInvokedCallback="false"|android:enableOnBackInvokedCallback="false" android:networkSecurityConfig="@xml/network_security_config" android:usesCleartextTraffic="false"|' "$MANIFEST"
          fi

          # 4. Scope storage permissions to correct SDK versions
          sed -i 's|<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>|<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>|' "$MANIFEST"
          sed -i 's|<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"/>|<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" tools:node="replace"/>|' "$MANIFEST"

          # 5. Add FOREGROUND_SERVICE permissions (proper VoIP declaration)
          if ! grep -q 'FOREGROUND_SERVICE"' "$MANIFEST"; then
            sed -i '/<uses-permission android:name="android.permission.WAKE_LOCK"/a\  <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>\n  <uses-permission android:name="android.permission.FOREGROUND_SERVICE_PHONE_CALL"/>' "$MANIFEST"
          fi

          # 6. Add FOREGROUND_SERVICE sub-type permissions (Android 14+ requirement)
          if ! grep -q 'FOREGROUND_SERVICE_DATA_SYNC' "$MANIFEST"; then
            sed -i '/<uses-permission android:name="android.permission.FOREGROUND_SERVICE_PHONE_CALL"/a\  <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC"/>\n  <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>' "$MANIFEST"
          fi

          # 7. Remove dangerous auto-added permissions that trigger Play Protect
          # Some libraries auto-add READ_PHONE_STATE which is a major red flag
          if ! grep -q 'tools:node="remove".*READ_PHONE_STATE' "$MANIFEST"; then
            sed -i '/<\/manifest>/i\  <uses-permission android:name="android.permission.READ_PHONE_STATE" tools:node="remove"/>\n  <uses-permission android:name="android.permission.READ_CALL_LOG" tools:node="remove"/>\n  <uses-permission android:name="android.permission.READ_CONTACTS" tools:node="remove"/>' "$MANIFEST"
          fi

          # 8. Ensure tools namespace exists
          if ! grep -q 'xmlns:tools' "$MANIFEST"; then
            sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android"|<manifest xmlns:android="http://schemas.android.com/apk/res/android" xmlns:tools="http://schemas.android.com/tools"|' "$MANIFEST"
          fi

          # 9. Create network security config (enforce HTTPS)
          mkdir -p android/app/src/main/res/xml
          printf '%s\n' \
            '<?xml version="1.0" encoding="utf-8"?>' \
            '<network-security-config>' \
            '    <base-config cleartextTrafficPermitted="false">' \
            '        <trust-anchors>' \
            '            <certificates src="system"/>' \
            '        </trust-anchors>' \
            '    </base-config>' \
            '</network-security-config>' \
            > android/app/src/main/res/xml/network_security_config.xml

          # 10. Enable R8 full mode + ProGuard for proper obfuscation
          GRADLE_PROPS="android/gradle.properties"
          echo "" >> "$GRADLE_PROPS"
          echo "# ★ Play Protect compliance: R8 minification + shrinking" >> "$GRADLE_PROPS"
          echo "android.enableMinifyInReleaseBuilds=true" >> "$GRADLE_PROPS"
          echo "android.enableShrinkResourcesInReleaseBuilds=true" >> "$GRADLE_PROPS"
          echo "android.enableR8.fullMode=true" >> "$GRADLE_PROPS"

          # 11. Ensure release build is not debuggable (critical for Play Protect)
          APP_GRADLE="android/app/build.gradle"
          if ! grep -q 'debuggable false' "$APP_GRADLE"; then
            sed -i '/buildTypes {/,/release {/ {
              /release {/a\            debuggable false\n            jniDebuggable false
            }' "$APP_GRADLE"
          fi

          # 12. Add ProGuard rules to strip debug info from release
          mkdir -p android/app
          cat > android/app/proguard-rules-custom.pro << 'EOF'
          # Remove logging from release builds (reduces Play Protect suspicion)
          -assumenosideeffects class android.util.Log {
              public static int d(...);
              public static int v(...);
              public static int i(...);
          }
          # Keep Firebase and Notifee service classes
          -keep class io.invertase.firebase.** { *; }
          -keep class app.notifee.** { *; }
          -keep class com.auxi.app.** { *; }
          EOF

          # Add custom ProGuard rules to build.gradle if not already there
          if ! grep -q 'proguard-rules-custom.pro' "$APP_GRADLE"; then
            sed -i 's|proguardFiles getDefaultProguardFile("proguard-android.txt")|proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules-custom.pro"|' "$APP_GRADLE"
          fi

          echo "✅ Security hardening applied"

      # ─── Copy google-services.json ───────────────────────────────────────
      - name: Setup Firebase config
        run: |
          cp google-services.json android/app/google-services.json

      # ─── Decode signing keystore ─────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/aux-release.keystore

      # ─── Build Release APK ──────────────────────────────────────────────
      - name: Build signed release APK
        run: |
          cd android
          chmod +x gradlew

          # ★ Optimized Gradle flags for maximum build speed
          ./gradlew assembleRelease \
            -x lint \
            -x test \
            --build-cache \
            --parallel \
            --configure-on-demand \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError" \
            -Dorg.gradle.parallel=true \
            -PreactNativeArchitectures=arm64-v8a \
            -Pandroid.injected.signing.store.file=$PWD/app/aux-release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # ─── Upload APK artifact ─────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aux-release-${{ github.sha }}
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ─── Build summary ──────────────────────────────────────────────────
      - name: Build summary
        if: success()
        run: |
          APK_SIZE=$(du -sh android/app/build/outputs/apk/release/*.apk | cut -f1)
          echo "### ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **APK Size** | ${APK_SIZE} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Architecture** | arm64-v8a |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${GITHUB_SHA::7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${GITHUB_REF_NAME}\` |" >> $GITHUB_STEP_SUMMARY
